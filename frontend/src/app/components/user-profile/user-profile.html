<div class="profile-card">
  <h2>User Profile 👤</h2>

  <div class="profile-info">
    <p>
      <strong>Name:</strong>
      {{ profile?.name }}
    </p>

    <p>
      <strong>User ID:</strong>
      {{ profile?.userId }}
    </p>

    <p>
      <strong>Role:</strong>
      {{ profile?.role }}
    </p>

    <p>
      <strong>Email:</strong>
      {{ profile?.email }}
    </p>
  </div>
</div>
