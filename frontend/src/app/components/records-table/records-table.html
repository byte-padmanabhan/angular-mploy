<div class="table-card">
  <h2>User Records 📄</h2>

  <div *ngIf="isLoading">Fetching records...</div>

  <table *ngIf="!isLoading">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let record of records">
        <td>{{ record.id }}</td>

        <td>{{ record.title }}</td>

        <td>{{ record.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
